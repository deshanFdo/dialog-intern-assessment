name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: python -m py_compile app/main.py app/llm.py app/rag_store.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dialog-backend ./backend

      - name: Start container
        run: |
          docker run -d --name test-backend \
            -p 8000:8000 \
            -e LLM_PROVIDER=gemini \
            -e GEMINI_API_KEY=test-placeholder \
            dialog-backend
          sleep 3

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check returned: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f test-backend || true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
